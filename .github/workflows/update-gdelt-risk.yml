name: Update GDELT route risk

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: gdelt-route-risk-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch GDELT and update AuraDB
        env:
          AURA_NEO4J_URI: ${{ secrets.AURA_NEO4J_URI }}
          AURA_NEO4J_USERNAME: ${{ secrets.AURA_NEO4J_USERNAME }}
          AURA_NEO4J_PASSWORD: ${{ secrets.AURA_NEO4J_PASSWORD }}
          AURA_NEO4J_DATABASE: ${{ secrets.AURA_NEO4J_DATABASE }}
          GDELT_TIMESPAN: 24h
          GDELT_RISK_TTL_HOURS: "3"
        run: python scripts/update_gdelt_risk.py
